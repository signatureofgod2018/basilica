name: CI — Build, Test, Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-board-room

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: boardroom
          POSTGRES_PASSWORD: boardroom
          POSTGRES_DB: boardroom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    env:
      POSTGRES_URL: postgresql://boardroom:boardroom@localhost:5432/boardroom
      POSTGRES_TEST_URL: postgresql://boardroom:boardroom@localhost:5432/boardroom_test
      QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Platform smoke tests
        run: npm run test:platform

      - name: Functional tests
        run: npm run test:functional

      - name: Regression suite
        run: npm run test:regression

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push openclaw image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/openclaw/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/openclaw:latest
            ${{ env.IMAGE_PREFIX }}/openclaw:${{ steps.tag.outputs.SHA }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dashboard:latest
            ${{ env.IMAGE_PREFIX }}/dashboard:${{ steps.tag.outputs.SHA }}
