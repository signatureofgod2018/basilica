name: CI — Build, Test, Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-board-room

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test --if-present

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push openclaw image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/openclaw/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/openclaw:latest
            ${{ env.IMAGE_PREFIX }}/openclaw:${{ steps.tag.outputs.SHA }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dashboard:latest
            ${{ env.IMAGE_PREFIX }}/dashboard:${{ steps.tag.outputs.SHA }}
